[env]
TERM= "screen-256color"

[general]
import = [
	"quiet.toml",
	"win32.toml"
]

[window]
padding.y = 1
dynamic_padding = true
title="~"
decorations_theme_variant = "Dark"

[font]
normal.family = "Courier New"
# bold.family = "IBM Plex Mono"
# italic.family = "IBM Plex Mono"
# bold_italic.family = "IBM Plex Mono"

size = 13

# offset = { x = 0, y = 0 }

[cursor]
style = {shape="Block",blinking="Never"}
unfocused_hollow = true

[keyboard]
bindings = [
{ key="F11", action="ToggleFullscreen" },
{ key = "N", mods = "Control|Shift", action = "CreateNewWindow" },
{ key = "Space", mods="Control",action = "ToggleViMode" }, #vim abbreviation trigger :? cmd.exe uses <C-M>
{ key = "[", mods="Control",mode="Vi|~Search",action = "ClearSelection" }, #<C-c>
{ key = "[", mods="Control",mode="Search",action = "SearchCancel" }, #<C-c>
]

# https://alacritty.org/config-alacritty-bindings.html
